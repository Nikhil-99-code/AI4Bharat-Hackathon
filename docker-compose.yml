version: '3.8'

services:
  agri-nexus:
    build: .
    container_name: agri-nexus-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./static:/app/static
      - ./shared:/app/shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
